# apphosting.yaml
# Firebase App Hosting runtime configuration.
# See: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  # ── Public Firebase Client SDK ──
  # These are public client-side values embedded in the browser bundle.
  # They are NOT secrets — they are safe to commit as plain values.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDxT99fYHhqdvRl11lxJ9WarcKrv0y41Jc

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: bvpw108.firebaseapp.com

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: bvpw108

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: bvpw108.firebasestorage.app

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "10237671112"

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:10237671112:web:3ee6046eaef61f0fbe57fd"

  # ── App URL ──
  - variable: ZITE_APP_URL
    value: https://bvpw108.web.app

  # ── Server-side secrets (placeholder values for initial deployment) ──
  # These are used by notification/cron systems. Replace with real values later.
  - variable: ZITE_REMINDER_SECRET
    value: placeholder_reminder_secret_change_me

  - variable: ZITE_CRON_SECRET
    value: placeholder_cron_secret_change_me

  - variable: ZITE_VAPID_PUBLIC_KEY
    value: placeholder_vapid_public_change_me

  - variable: ZITE_VAPID_PRIVATE_KEY
    value: placeholder_vapid_private_change_me
